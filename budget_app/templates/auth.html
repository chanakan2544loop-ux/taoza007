<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if mode == 'login' %}เข้าสู่ระบบ{% else %}สมัครสมาชิก{% endif %} — Budgety</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🌸</span>
      <h1 class="logo-text">Budgety</h1>
      <p class="logo-sub">จัดการงบประมาณส่วนตัว</p>
    </div>

    <div class="auth-tabs">
      <a href="/login" class="tab-btn {% if mode == 'login' %}active{% endif %}">เข้าสู่ระบบ</a>
      <a href="/register" class="tab-btn {% if mode == 'register' %}active{% endif %}">สมัครสมาชิก</a>
    </div>

    <div id="error-msg" class="error-msg hidden"></div>
    <div id="success-msg" class="success-msg hidden"></div>

    {% if mode == 'login' %}
    <form id="login-form" class="auth-form">
      <div class="field-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary btn-full">เข้าสู่ระบบ</button>
    </form>
    {% else %}
    <form id="register-form" class="auth-form">
      <div class="field-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" />
      </div>
      <div class="field-group">
        <label>งบประมาณรายสัปดาห์ (บาท)</label>
        <input type="number" id="weekly_budget" placeholder="เช่น 1500" value="1500" min="1" />
      </div>
      <button type="submit" class="btn-primary btn-full">สมัครสมาชิก</button>
    </form>
    {% endif %}
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
